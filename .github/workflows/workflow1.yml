name: MATLAB Tests and Code Coverage

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4

      - name: Clone COBRA Toolbox
        run: |
          git clone -b CI https://github.com/farid-zare/cobratoolbox.git cobratoolbox

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: cobratoolbox/test/CodeCovTestResults.xml

      - name: Debug GitHub Actions Secrets
        run: env | sort
